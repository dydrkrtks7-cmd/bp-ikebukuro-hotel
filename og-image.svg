<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="222" cy="65" r="29" fill="#e91e63" opacity="0.17"/>
    <circle cx="36" cy="262" r="42" fill="#e91e63" opacity="0.06"/>
    <circle cx="648" cy="332" r="85" fill="#e91e63" opacity="0.09"/>
    <circle cx="789" cy="509" r="55" fill="#e91e63" opacity="0.15"/>
    <circle cx="145" cy="5" r="90" fill="#e91e63" opacity="0.16"/>
    <circle cx="255" cy="125" r="47" fill="#e91e63" opacity="0.10"/>
    <rect x="1110" y="-86" width="57" height="45" rx="8" fill="#c2185b" opacity="0.04" transform="rotate(43, 775, 26)"/>
    <rect x="730" y="406" width="55" height="73" rx="8" fill="#c2185b" opacity="0.10" transform="rotate(33, 126, 154)"/>
    <rect x="143" y="84" width="74" height="70" rx="8" fill="#c2185b" opacity="0.13" transform="rotate(29, 782, 86)"/>
    <rect x="718" y="220" width="29" height="78" rx="8" fill="#c2185b" opacity="0.04" transform="rotate(40, 193, 406)"/>
    <rect x="933" y="381" width="99" height="65" rx="8" fill="#c2185b" opacity="0.05" transform="rotate(2, 84, 566)"/>
    <rect x="726" y="454" width="92" height="88" rx="8" fill="#c2185b" opacity="0.06" transform="rotate(34, 951, 459)"/>
    <rect x="486" y="82" width="78" height="24" rx="8" fill="#c2185b" opacity="0.12" transform="rotate(22, 1281, 268)"/>
    <rect x="345" y="187" width="75" height="51" rx="8" fill="#c2185b" opacity="0.11" transform="rotate(36, 374, -18)"/>
    <polygon points="948,225 1043,415 853,415" fill="#e91e63" opacity="0.08"/>
    <polygon points="60,225 131,367 -11,367" fill="#e91e63" opacity="0.09"/>
    <polygon points="963,101 1022,219 904,219" fill="#e91e63" opacity="0.09"/>
    <polygon points="934,-45 1016,119 852,119" fill="#e91e63" opacity="0.03"/>

  <!-- Wave at bottom -->
  <path d="M0,536 C360,583 840,489 1200,536 L1200,630 L0,630Z" fill="#e91e63" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Ikebukuro hotel 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Ikebukuro — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fff3e0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fff3e0" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Ikebukuro Ikebukuro hotel 안내 — 정보
  </text>
</svg>