<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="947" cy="-78" r="58" fill="#1a1a2e" opacity="0.12"/>
    <circle cx="1171" cy="113" r="20" fill="#1a1a2e" opacity="0.07"/>
    <circle cx="1094" cy="391" r="29" fill="#1a1a2e" opacity="0.10"/>
    <circle cx="145" cy="349" r="68" fill="#1a1a2e" opacity="0.10"/>
    <circle cx="1200" cy="671" r="75" fill="#1a1a2e" opacity="0.10"/>
    <circle cx="268" cy="254" r="55" fill="#1a1a2e" opacity="0.10"/>
    <rect x="-44" y="46" width="90" height="31" rx="8" fill="#0a0a0a" opacity="0.11" transform="rotate(44, 372, 223)"/>
    <rect x="559" y="409" width="95" height="31" rx="8" fill="#0a0a0a" opacity="0.13" transform="rotate(25, 823, 194)"/>
    <rect x="939" y="570" width="51" height="40" rx="8" fill="#0a0a0a" opacity="0.12" transform="rotate(39, 1155, 495)"/>
    <rect x="399" y="-61" width="44" height="61" rx="8" fill="#0a0a0a" opacity="0.04" transform="rotate(34, 735, 70)"/>
    <rect x="429" y="332" width="70" height="22" rx="8" fill="#0a0a0a" opacity="0.14" transform="rotate(25, 581, 435)"/>
    <rect x="1029" y="69" width="68" height="73" rx="8" fill="#0a0a0a" opacity="0.07" transform="rotate(10, 600, 308)"/>
    <rect x="872" y="24" width="95" height="78" rx="8" fill="#0a0a0a" opacity="0.13" transform="rotate(13, 447, 296)"/>
    <rect x="750" y="495" width="72" height="94" rx="8" fill="#0a0a0a" opacity="0.06" transform="rotate(3, 336, 566)"/>
    <polygon points="442,77 514,221 370,221" fill="#1a1a2e" opacity="0.04"/>
    <polygon points="-94,318 -25,456 -163,456" fill="#1a1a2e" opacity="0.09"/>
    <polygon points="917,417 968,519 866,519" fill="#1a1a2e" opacity="0.11"/>
    <polygon points="112,235 203,417 21,417" fill="#1a1a2e" opacity="0.04"/>

  <!-- Wave at bottom -->
  <path d="M0,578 C360,604 840,552 1200,578 L1200,630 L0,630Z" fill="#1a1a2e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Ikebukuro hotel 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Ikebukuro — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#7c3aed" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Ikebukuro Ikebukuro hotel 안내 — 정보
  </text>
